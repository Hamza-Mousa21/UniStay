<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alyamama:wght@300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/login.css" />
    <title>تسجيل الدخول | UniStay</title>
  </head>
  <body>
    <header class="login-navbar">
      <div class="login-nav-right">
        <a href="#" class="login-logo">
          <span class="login-logo-text">UniStay</span>
          <div class="login-logo-box">
            <img
              src="../images/5409f3b3-b085-4d42-8652-580678be8b8f.jpg"
              alt="شعار UniStay"
              class="login-logo-img"
            />
          </div>
        </a>
      </div>

      <nav class="login-nav-left">
        <a href="Home.html">الرئيسية</a>
        <a href="#">تسجيل الدخول</a>
      </nav>
    </header>

    <main class="login-selection-page">
      <section class="login-selection-hero">
        <div class="login-selection-header">
          <h1>أهلًا بك في UniStay</h1>
          <p>حدد نوع الحساب للانتقال إلى صفحة تسجيل الدخول المناسبة لك</p>
        </div>

        <div class="account-type-cards">
          <a href="#" class="account-type-card student-card">
            <div class="account-card-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 3L2 8l10 5 8-4v6h2V8L12 3zm-6 9v3c0 2.21 2.69 4 6 4s6-1.79 6-4v-3l-6 3-6-3z"
                ></path>
              </svg>
            </div>

            <div class="account-card-content">
              <h2>أنا طالب</h2>
              <p>أبحث عن سكن طلابي مناسب بالقرب من الجامعة</p>
            </div>
          </a>

          <a href="#" class="account-type-card owner-card">
            <div class="account-card-icon">
              <!-- Owner / Property SVG -->
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 10.5L12 3l9 7.5V21h-6v-6H9v6H3v-10.5zm2 1V19h2v-6h10v6h2v-7.5L12 5 5 11.5z"
                ></path>
              </svg>
            </div>

            <div class="account-card-content">
              <h2>أنا صاحب عقار</h2>
              <p>أرغب في عرض عقاري للطلاب وإدارة الإعلانات بكل سهولة</p>
            </div>
          </a>
        </div>
      </section>
    </main>
  </body>
  <footer class="login-footer">
    <p>© 2026 UniStay . جميع الحقوق محفوظة</p>
    <a href="#">بحاجة إلى مساعدة؟ تواصل معنا</a>
  </footer>
  <script src="./java/login.js"></script>
</html>
