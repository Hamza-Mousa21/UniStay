<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Login Page</title>

    <link rel="stylesheet" href="css/student login Page.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alyamama:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <header class="navbar">
      <div class="navbar-container">
        <div class="nav-right">
          <a href="Home.html" class="logo">UniStay</a>
          <a href="Home.html" class="logo-icon" aria-label="الشعار">
            <img
              src="../images/5409f3b3-b085-4d42-8652-580678be8b8f.jpg"
              alt="شعار الموقع"
            />
          </a>
        </div>

        <nav class="nav-center">
          <ul class="nav-links">
            <li><a href="Home.html">الرئيسية</a></li>
            <li><a href="Home.html#search-section">ابحث عن سكن</a></li>
            <li><a href="Home.html#why-us">لماذا تختار منصتنا</a></li>
            <li><a href="Home.html#how-it-works">كيف تعمل منصتنا</a></li>
          </ul>
        </nav>

        <div class="nav-left">
          <a href="student login Page.html" class="login-link active"
            >تسجيل الدخول</a
          >
          <a href="add-property.html" class="add-property-btn">أضف عقارك</a>
        </div>
      </div>
    </header>

    <main class="page-wrapper">
      <div class="container">
        <div class="form-section">
          <div class="form-box">
            <h2>إنشاء حساب</h2>
            <p class="subtitle">اختر نوع الحساب وأكمل البيانات</p>

            <div class="user-type">
              <button type="button" class="type-btn active" id="studentBtn">
                طالب
              </button>
              <button type="button" class="type-btn" id="ownerBtn">
                صاحب سكن
              </button>
            </div>

            <form id="registerForm">
              <div class="input-group">
                <label for="fullName">الاسم الكامل</label>
                <input
                  type="text"
                  id="fullName"
                  placeholder="أدخل اسمك الكامل"
                />
              </div>

              <div class="input-group">
                <label for="idNumber">الرقم الجامعي</label>
                <input type="text" id="idNumber" placeholder="مثال: 11912345" />
              </div>

              <div class="input-group">
                <label for="email">البريد الإلكتروني الجامعي</label>
                <input
                  type="email"
                  id="email"
                  placeholder="example@student.najah.edu"
                />
              </div>

              <div class="input-group">
                <label for="phone">رقم الهاتف</label>
                <input type="text" id="phone" placeholder="0599123456" />
              </div>

              <div class="input-group">
                <label for="password">كلمة المرور</label>
                <div class="password-box">
                  <span
                    class="toggle-password"
                    onclick="togglePassword('password', this)"
                  >
                    <i class="fa-regular fa-eye"></i>
                  </span>
                  <input type="password" id="password" placeholder="**" />
                </div>
              </div>

              <div class="input-group">
                <label for="confirmPassword">تأكيد كلمة المرور</label>
                <div class="password-box">
                  <span
                    class="toggle-password"
                    onclick="togglePassword('confirmPassword', this)"
                  >
                    <i class="fa-regular fa-eye"></i>
                  </span>
                  <input
                    type="password"
                    id="confirmPassword"
                    placeholder="**"
                  />
                </div>
              </div>

              <button type="submit" class="submit-btn" id="submitBtn">
                إنشاء حساب طالب
              </button>
            </form>
          </div>
        </div>

        <div class="image-section">
          <img
            src="../images/login-bg.jpg"
            alt="Background Image"
            class="bg-image"
          />
          <div class="overlay"></div>

          <div class="image-content">
            <div class="icon-box">
              <i class="fa-regular fa-building"></i>
            </div>
            <h1>انضم إلينا</h1>
            <p>ابدأ رحلتك في إيجاد السكن المثالي</p>
          </div>
        </div>
      </div>
    </main>

    <script src="java/student login Page.js"></script>
  </body>
</html>
