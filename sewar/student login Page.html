<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/student login Page.css" />
    <title>student login Page</title>
  </head>
  <body>
    <div class="container">
      <div class="form-section">
        <div class="form-box">
          <h2>إنشاء حساب</h2>
          <p class="subtitle">اختر نوع الحساب وأكمل البيانات</p>

          <div class="user-type">
            <button type="button" class="type-btn active" id="studentBtn">طالب</button>
            <button type="button" class="type-btn" id="ownerBtn">صاحب سكن</button>
          </div>

          <form id="registerForm">
            <div class="input-group">
              <label for="fullName">الاسم الكامل</label>
              <input type="text" id="fullName" placeholder="أدخل اسمك الكامل" />
            </div>

            <div class="input-group">
              <label for="idNumber">الرقم الجامعي</label>
              <input type="text" id="idNumber" placeholder="مثال: 11912345" />
            </div>

            <div class="input-group">
              <label for="email">البريد الإلكتروني الجامعي</label>
              <input type="email" id="email" placeholder="example@student.najah.edu" />
            </div>

            <div class="input-group">
              <label for="phone">رقم الهاتف</label>
              <input type="text" id="phone" placeholder="0599123456" />
            </div>

            <div class="input-group">
              <label for="password">كلمة المرور</label>
              <div class="password-box">
                <span class="toggle-password" onclick="togglePassword('password', this)">
                  <i class="fa-regular fa-eye"></i>
                </span>
                <input type="password" id="password" placeholder="****" />
              </div>
            </div>

            <div class="input-group">
              <label for="confirmPassword">تأكيد كلمة المرور</label>
              <div class="password-box">
                <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                  <i class="fa-regular fa-eye"></i>
                </span>
                <input type="password" id="confirmPassword" placeholder="****" />
              </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              إنشاء حساب طالب
            </button>
          </form>
        </div>
      </div>

      <div class="image-section">
        <img src="../images/login-bg.jpg" alt="Background Image" class="bg-image" />
        <div class="overlay"></div>

        <div class="image-content">
          <div class="icon-box">
            <i class="fa-regular fa-building"></i>
          </div>
          <h1>انضم إلينا</h1>
          <p>ابدء رحلتك في إيجاد السكن المثالي</p>
        </div>
      </div>
    </div>

  

  </body>
  <script src="java/student login Page.js"></script>
</html>
